# Copy this file to google.properties and fill values from Google Cloud Console.
# Do not commit google.properties.
google.client.id=
google.client.secret=

# Optional. Leave blank to let the servlet use the current app URL:
# http://localhost:8080/auth/google/callback
# or http://localhost:8080/HRMS/auth/google/callback when deployed under /HRMS.
google.redirect.uri=
